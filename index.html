<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envelope</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .mobile-container { width: 100vw; height: 100vh; max-width: 430px; position: relative; overflow: hidden; background: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .page { width: 100%; height: 100%; display: none; position: absolute; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .page.active { display: flex; }
        
        /* Page 1 Styles */
        #page1 { background: linear-gradient(rgba(255,105,180,0.25), rgba(255,105,180,0.25)), url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=600&auto=format&fit=crop') no-repeat center/cover; }
        .envelope-container { position: relative; cursor: pointer; display: flex; justify-content: center; align-items: center; width: 280px; height: 180px; transform: translateY(-30px); perspective: 1000px; }
        .envelope { width: 100%; height: 100%; background: #f5f5f5; border: 2px solid #ddd; border-top: none; position: relative; z-index: 2; border-radius: 0 0 8px 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        
        .envelope::before { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 0; border-left: 140px solid #eaeaea; border-top: 90px solid transparent; z-index: 3; border-radius: 0 0 0 8px; }
        .envelope::after { content: ''; position: absolute; bottom: 0; right: 0; width: 0; height: 0; border-right: 140px solid #e2e2e2; border-top: 90px solid transparent; z-index: 3; border-radius: 0 0 8px 0; }
        
        .flap { width: 0; height: 0; border-left: 140px solid transparent; border-right: 140px solid transparent; border-top: 95px solid #dcdcdc; position: absolute; top: 0; left: 0; transform-origin: top; transition: transform 0.4s ease, z-index 0.2s ease; z-index: 4; }
        .open .flap { transform: rotateX(180deg); z-index: 1; border-top-color: #cbcbcb; }
        
        .letter { position: absolute; width: 250px; height: 140px; background: white; top: 20px; left: 15px; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; font-size: 22px; font-weight: bold; color: #ff4d6d; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease; z-index: 2; opacity: 0; border-radius: 4px; padding: 15px; text-align: center; }
        .open .letter { opacity: 1; transform: translateY(-110px); z-index: 2; }
        
        .msg-box { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 20; gap: 15px; }
        .msg-btn { flex: 1; background: rgba(255,255,255,0.95); padding: 14px 10px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 14px; color: #333; border: 1px solid #ddd; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .msg-btn:active { transform: scale(0.95); }
        
        /* Page 2 Styles */
        #page2 { background: #fff0f5; flex-direction: column; justify-content: center; gap: 30px; padding: 25px; text-align: center; }
        .cat-message { font-size: 1.8rem; font-weight: bold; color: #ff4d6d; }
        #cat-img { width: 70%; max-width: 220px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Page 3 Styles */
        #page3 { background: #fffaf0; justify-content: space-between; padding: 50px 20px; text-align: center; }
        .paneer-animation-section { width: 100%; display: flex; justify-content: center; height: 45%; align-items: center; }
        .kadhai-container { position: relative; width: 200px; height: 200px; }
        .kadhai-img { width: 200px; height: 200px; object-fit: cover; border-radius: 50%; border: 6px solid #333; box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .spatula-handle { position: absolute; top: -30px; left: 85px; width: 24px; height: 140px; background: linear-gradient(to bottom, #8b5a2b 70%, #d2691e 100%); border-radius: 4px; transform-origin: top center; animation: stirMobile 2s infinite ease-in-out; z-index: 5; }
        @keyframes stirMobile { 0%, 100% { transform: rotate(-20deg); } 50% { transform: rotate(20deg) translate(15px, 5px); } }
        
        .paneer-text-section { width: 100%; height: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .paneer-heading { font-size: 1.6rem; color: #d32f2f; font-weight: bold; margin-bottom: 25px; }
        .paneer-options { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .paneer-options .msg-btn { background: #ffebd7; border: 1px solid #ffcc99; color: #8b4513; }
        
        /* Decision Screens */
        .decision-page { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; padding: 30px; z-index: 30; text-align: center; }
        .decision-page.active { display: flex; }
        #dPage2 { background: #f0fff4; color: #2e7d32; font-size: 1.8rem; font-weight: bold; padding: 40px; }
        
        #dPage1 { background: #fff0f5; color: #ff4d6d; justify-content: space-around; padding: 30px 20px 110px 20px; }
        .lipgloss-heading { font-size: 1.6rem; font-weight: bold; padding: 0 10px; line-height: 1.3; margin-top: 20px; }
        #lipgloss-img { width: 100%; height: 45vh; max-height: 400px; object-fit: contain; border-radius: 20px; }
        
        /* Funky Jukebox Section Styles */
        .jukebox-container { display: none; width: 95%; max-height: 70vh; overflow-y: auto; background: #fff; border: 3px solid #ff4d6d; padding: 25px 15px; border-radius: 24px; box-shadow: 0 8px 24px rgba(255,77,109,0.2); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .jukebox-title { font-size: 1.6rem; font-weight: bold; color: #ff4d6d; margin-bottom: 20px; line-height: 1.2; }
        .track-list { display: flex; flex-direction: column; gap: 14px; width: 100%; }
        
        .track-card { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: #fff0f5; border: 2px solid #ffccd5; border-radius: 20px; cursor: pointer; transition: all 0.2s ease; }
        .track-card:active { transform: scale(0.97); }
        .track-card.playing { background: #ff4d6d; border-color: #ff4d6d; color: #fff; box-shadow: 0 4px 12px rgba(255,77,109,0.3); }
        .track-info { text-align: left; display: flex; flex-direction: column; gap: 2px; flex: 1; }
        .track-title { font-weight: bold; font-size: 1.1rem; }
        .track-status { font-size: 0.85rem; opacity: 0.8; }
        .play-icon { font-size: 1.4rem; margin-left: 10px; }

        /* CD Container and Uniform Rotation Animation */
        .cd-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-right: 15px; }
        .cd-visual { width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle, #fff 12%, #333 12%, #333 25%, #111 26%, #555 60%, #222 70%, #ff4d6d 90%); border: 2px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.2); animation: spinCD 2.5s linear infinite; }
        .track-card.playing .cd-visual { border-color: #fff0f5; }
        .cd-label { font-size: 0.75rem; font-weight: bold; margin-top: 5px; color: #333; text-transform: lowercase; max-width: 65px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; }
        .track-card.playing .cd-label { color: #fff; }
        
        @keyframes spinCD { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Video Container Display Box Custom Formatting */
        .video-container-box { display: none; background: #000; border: 4px dashed #ff4d6d; padding: 10px; border-radius: 24px; width: 95%; max-height: 80vh; margin: auto; box-shadow: 0 8px 30px rgba(255,77,109,0.3); animation: popIn 0.5s ease; overflow: hidden; }
        .custom-looped-video { width: 100%; height: auto; max-height: 70vh; display: block; border-radius: 16px; object-fit: contain; background: #000; }
        
        /* Video Bottom Dedicated Text Label */
        .video-caption-label { display: block; color: #ff4d6d; font-size: 1.5rem; font-weight: bold; margin-top: 15px; letter-spacing: 0.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <audio id="bgm" loop>
        <source src="https://files.catbox.moe/i7p6q5.mp3" type="audio/mpeg">
    </audio>

    <audio id="forgiveAudio">
        <source src="https://files.catbox.moe/dlgmx9.mp3&t=2,7" type="audio/mpeg">
    </audio>

    <audio id="jukeboxAudio"></audio>

    <div class="mobile-container">
        <div class="page active" id="page1">
            <div class="envelope-container" onclick="openEnvelope(this)">
                <div class="flap"></div>
                <div class="letter" id="letterText">i am sorry na :(</div>
                <div class="envelope"></div>
            </div>
            <div class="msg-box" id="p1Messages" style="display: none;">
                <button class="msg-btn" onclick="goToPage('page3')">i hate you</button>
                <button class="msg-btn" onclick="goToPage('page2')">aage se nhi hona chaiye</button>
            </div>
        </div>

        <div class="page" id="page2">
            <div class="cat-message">okiieee madam jiii</div>
            <img id="cat-img" src="https://i.ibb.co/Qv8vFp6p/Picsart-26-06-18-04-44-48-111.png" alt="Cat">
        </div>

        <div class="page" id="page3">
            <div class="paneer-animation-section">
                <div class="kadhai-container">
                    <img class="kadhai-img" src="https://i.ibb.co/rRVDdnGX/Picsart-26-06-18-04-30-37-529.png" alt="Paneer">
                    <div class="spatula-handle"></div>
                </div>
            </div>
            <div class="paneer-text-section">
                <h1 class="paneer-heading">wanna go on a kadhai paneer date? 🍲</h1>
                <div class="paneer-options">
                    <button class="msg-btn" onclick="showDecisionPage('dPage1')">i still hate you</button>
                    <button class="msg-btn" onclick="showDecisionPage('dPage2')">sure....</button>
                </div>
            </div>
        </div>

        <div class="decision-page" id="dPage2">chats me baki details decide krle? 😉✨</div>
        
        <div class="decision-page" id="dPage1">
            <h1 class="lipgloss-heading" id="lipglossMainText">awww darling, i promise I'll buy you a lipgloss toooo 💖</h1>
            <img id="lipgloss-img" src="https://i.ibb.co/1GPK44X8/Picsart-26-06-18-05-51-59-929.png" alt="Lipgloss">
            
            <div class="jukebox-container" id="jukeboxSection">
                <h2 class="jukebox-title">muhehehehehehehe🤙😝</h2>
                <div class="track-list">
                    <div class="track-card" onclick="playJukeboxTrack(this, 'https://files.catbox.moe/q8udno.mp3', 7.0, 35.0)">
                        <div class="cd-wrapper">
                            <div class="cd-visual"></div>
                            <span class="cd-label">For you🫶</span>
                        </div>
                        <div class="track-info">
                            <span class="track-title">Sorry sorry</span>
                            <span class="track-status">Tap to play loop</span>
                        </div>
                        <span class="play-icon">▶️</span>
                    </div>
                    <div class="track-card" onclick="playJukeboxTrack(this,'https://files.catbox.moe/6tcza6.mp3', 0.0, 0.0)">
                        <div class="cd-wrapper">
                            <div class="cd-visual"></div>
                            <span class="cd-label">For you🫶</span>
                        </div>
                        <div class="track-info">
                            <span class="track-title">Re mama re</span>
                            <span class="track-status">Tap to play loop</span>
                        </div>
                        <span class="play-icon">▶️</span>
                    </div>
                </div>
            </div>

            <div class="video-container-box" id="videoDisplayBox">
                <video class="custom-looped-video" id="rejectionVideo" loop playsinline muted>
                    <source src="https://files.catbox.moe/vljjzg.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <span class="video-caption-label">I love you maalkin🫶🫠</span>
            </div>

            <div class="msg-box" id="lipglossActionButtons">
                <button class="msg-btn" onclick="handleFinalSelection('never')">don't ever text me again</button>
                <button class="msg-btn" onclick="handleFinalSelection('thikh')">fir thikkkk h</button>
            </div>
        </div>
    </div>

    <script>
        const forgiveAudio = document.getElementById('forgiveAudio');
        const jukeboxAudio = document.getElementById('jukeboxAudio');
        const mainBgm = document.getElementById('bgm');
        const rejectionVideo = document.getElementById('rejectionVideo');

        let loopStart = 0;
        let loopEnd = 0;

        // Biceps dance loop track logic
        if (forgiveAudio) {
            forgiveAudio.addEventListener('timeupdate', function() {
                if (this.currentTime >= 6.9) { 
                    this.currentTime = 2.0;
                    this.play().catch(e => console.log(e));
                }
            });
            forgiveAudio.addEventListener('ended', function() {
                this.currentTime = 2.0;
                this.play().catch(e => console.log(e));
            });
        }

        // Custom engine to loop jukebox audio cards inside parameters
        if (jukeboxAudio) {
            jukeboxAudio.addEventListener('timeupdate', function() {
                if (loopEnd > 0 && this.currentTime >= (loopEnd - 0.1)) {
                    this.currentTime = loopStart;
                    this.play().catch(e => console.log(e));
                }
            });
            jukeboxAudio.addEventListener('ended', function() {
                this.currentTime = loopStart;
                this.play().catch(e => console.log(e));
            });
        }

        function openEnvelope(element) {
            if (!element.classList.contains('open')) {
                element.classList.add('open');
                if (mainBgm) {
                    mainBgm.play().catch(err => console.log("Interaction check:", err));
                }
                setTimeout(function() { 
                    document.getElementById('p1Messages').style.display = 'flex'; 
                }, 600);
            }
        }

        function goToPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.decision-page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');

            if (pageId === 'page2') {
                if (mainBgm) mainBgm.pause();
                if (forgiveAudio) {
                    forgiveAudio.currentTime = 2.0; 
                    forgiveAudio.play().catch(err => console.log("Audio playback error:", err));
                }
            }
        }

        function showDecisionPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.decision-page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function playJukeboxTrack(element, url, start, end) {
            const cards = document.querySelectorAll('.track-card');
            const isAlreadyPlaying = element.classList.contains('playing');
            
            cards.forEach(c => {
                c.classList.remove('playing');
                c.querySelector('.play-icon').innerText = '▶️';
                c.querySelector('.track-status').innerText = 'Tap to play loop';
            });

            if (isAlreadyPlaying) {
                jukeboxAudio.pause();
                return;
            }

            if (mainBgm) mainBgm.pause();
            if (forgiveAudio) forgiveAudio.pause();

            loopStart = start;
            loopEnd = end;

            element.classList.add('playing');
            element.querySelector('.play-icon').innerText = '⏸️';
            element.querySelector('.track-status').innerText = 'Looping now...';

            jukeboxAudio.src = url;
            jukeboxAudio.currentTime = start;
            jukeboxAudio.play().catch(e => console.log("Playback error:", e));
        }

        function handleFinalSelection(choice) {
            const screen = document.getElementById('dPage1');
            const mainHeading = document.getElementById('lipglossMainText');
            const lipglossImg = document.getElementById('lipgloss-img');
            const actionButtons = document.getElementById('lipglossActionButtons');
            const jukeboxSection = document.getElementById('jukeboxSection');
            const videoDisplayBox = document.getElementById('videoDisplayBox');
            
            mainHeading.style.display = 'none';
            if (lipglossImg) lipglossImg.style.display = 'none';
            actionButtons.style.display = 'none';
            
            if (choice === 'thikh') {
                screen.style.backgroundColor = '#ffffff';
                jukeboxSection.style.display = 'block'; 
            } else if (choice === 'never') {
                if (mainBgm) mainBgm.pause();
                if (forgiveAudio) forgiveAudio.pause();
                if (jukeboxAudio) jukeboxAudio.pause();

                screen.style.backgroundColor = '#000000';
                videoDisplayBox.style.display = 'block';
                
                if (rejectionVideo) {
                    rejectionVideo.currentTime = 0;
                    rejectionVideo.muted = false; 
                    rejectionVideo.play().catch(e => console.log("Video auto play check:", e));
                }
            }
        }
    </script>
</body>
</html>
